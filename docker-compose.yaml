services:
    node:
        image: dmitryarollingscopes/nodejs2025q2-service:dev
        environment:
            PORT: ${PORT}
            POSTGRES_HOST: ${POSTGRES_HOST}
            POSTGRES_PORT: ${POSTGRES_PORT}
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USERNAME: ${POSTGRES_USERNAME}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        networks:
            - rolling-scopes
        ports:
            - ${PORT}:${PORT}
        restart: on-failure
        depends_on:
            - postgres
        volumes:
            - ./src:/srv/app/src

    postgres:
        image: dmitryarollingscopes/nodejs2025q2-postgres:dev
        command: [postgres, -p, '${POSTGRES_PORT}']
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        networks:
            - rolling-scopes
        ports:
            - ${POSTGRES_PORT}:${POSTGRES_PORT}
        restart: on-failure
        volumes:
            - postgres:/var/lib/postgresql/data

networks:
    rolling-scopes:

volumes:
    postgres:
